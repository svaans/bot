name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install maturin build
          pip install pybind11
      - name: Install clang-tidy
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Run cargo clippy
        run: |
          cargo clippy --manifest-path fast_tp_sl/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path fast_indicators_rust/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust_backtesting/Cargo.toml --all-targets
          cargo clippy --manifest-path score_rust/Cargo.toml --all-targets -- -D warnings -- -D warnings

      - name: Run cargo audit
        run: |
          cargo audit --manifest-path fast_tp_sl/Cargo.toml
          cargo audit --manifest-path fast_indicators_rust/Cargo.toml
          cargo audit --manifest-path rust_backtesting/Cargo.toml
          cargo audit --manifest-path score_rust/Cargo.toml

      - name: Run clang-tidy
        if: matrix.os == 'ubuntu-latest'
        run: clang-tidy fast_indicators/fast_indicators.cpp -- -std=c++17

      - name: Build Rust wheels
        run: |
          maturin build --release -m fast_tp_sl/Cargo.toml -o dist
          maturin build --release -m fast_indicators_rust/Cargo.toml -o dist
          maturin build --release -m score_rust/Cargo.toml -o dist

      - name: Build pybind11 wheel
        env:
          CXXFLAGS: "-fsanitize=address -O1 -fno-omit-frame-pointer"
          LDFLAGS: "-fsanitize=address"
        run: python setup.py bdist_wheel

      - name: Install built wheels
        run: pip install dist/*.whl

      - name: Run Python tests
        run: pytest -q

      - name: Run Go tests
        run: go test ./...

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl