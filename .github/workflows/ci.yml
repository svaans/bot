name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install maturin build
          pip install pybind11

      - name: Build Rust wheels
        run: |
          maturin build --release -m fast_tp_sl/Cargo.toml -o dist
          maturin build --release -m fast_indicators_rust/Cargo.toml -o dist

      - name: Build pybind11 wheel
        run: python setup.py bdist_wheel

      - name: Install built wheels
        run: pip install dist/*.whl

      - name: Run Python tests
        run: pytest -q

      - name: Run Go tests
        run: go test ./...

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl