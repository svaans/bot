syntax = "proto3";
package candle;

message CandleRequest {
  string symbol = 1;
  string interval = 2;
}

message Candle {
  string symbol = 1;
  int64 timestamp = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  double close = 6;
  double volume = 7;
}

service CandleService {
  rpc Subscribe(CandleRequest) returns (stream Candle);
}